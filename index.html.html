<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가족 행사 플래너 - DeepMind Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        // Global variables provided by environment
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'family-planner-default';
        const apiKey = ""; // API key for Gemini

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let events = [];

        // UI Elements
        const eventList = document.getElementById('event-list');
        const eventForm = document.getElementById('event-form');
        const loadingOverlay = document.getElementById('loading-overlay');
        const aiModal = document.getElementById('ai-modal');
        const aiContent = document.getElementById('ai-content');

        // Auth Logic
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                setupRealtimeListener();
            }
        });

        initAuth();

        // Firestore Logic
        function setupRealtimeListener() {
            if (!currentUser) return;
            const colRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'familyEvents');
            
            onSnapshot(colRef, (snapshot) => {
                events = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                events.sort((a, b) => new Date(a.date) - new Date(b.date));
                renderEvents();
            }, (error) => {
                console.error("Firestore error:", error);
            });
        }

        async function addEvent(e) {
            e.preventDefault();
            if (!currentUser) return;

            const name = document.getElementById('event-name').value;
            const date = document.getElementById('event-date').value;
            const type = document.getElementById('event-type').value;
            const target = document.getElementById('event-target').value;
            const note = document.getElementById('event-note').value;

            try {
                const colRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'familyEvents');
                await addDoc(colRef, {
                    name, date, type, target, note,
                    createdAt: new Date().toISOString()
                });
                eventForm.reset();
            } catch (error) {
                console.error("Add error:", error);
            }
        }

        async function deleteEvent(id) {
            if (!confirm('이 행사를 삭제하시겠습니까?')) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'familyEvents', id);
                await deleteDoc(docRef);
            } catch (error) {
                console.error("Delete error:", error);
            }
        }

        // Gemini AI Integration
        async function getAiSuggestions(event) {
            showLoading(true);
            const prompt = `가족 행사 플래너입니다. 다음 행사에 대한 특별한 축하 아이디어를 제안해주세요.
            행사명: ${event.name}
            대상: ${event.target} (관계/특징)
            날짜: ${event.date}
            행사 종류: ${event.type}
            참고 노트: ${event.note}

            제안에는 1. 추천 선물, 2. 추천 장소 또는 활동, 3. 감동적인 축하 메시지 문구(목회자적 따뜻함과 지혜가 담긴 문구)를 포함해주세요.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "아이디어를 가져오지 못했습니다.";
                
                aiContent.innerHTML = text.replace(/\n/g, '<br>');
                aiModal.classList.remove('hidden');
                aiModal.classList.add('flex');
            } catch (error) {
                console.error("AI error:", error);
            } finally {
                showLoading(false);
            }
        }

        function calculateDDay(dateStr) {
            const today = new Date();
            today.setHours(0,0,0,0);
            const targetDate = new Date(dateStr);
            targetDate.setHours(0,0,0,0);
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return "Today";
            return diffDays > 0 ? `D-${diffDays}` : `D+${Math.abs(diffDays)}`;
        }

        function renderEvents() {
            eventList.innerHTML = '';
            if (events.length === 0) {
                eventList.innerHTML = `<div class="text-center py-20 text-indigo-200/50">등록된 가족 행사가 없습니다.</div>`;
                return;
            }

            events.forEach(event => {
                const dDay = calculateDDay(event.date);
                const isUpcoming = !dDay.startsWith('D+');
                
                const card = document.createElement('div');
                card.className = `glass-card p-6 rounded-3xl mb-4 border border-white/10 hover:border-white/20 transition-all duration-300`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 mb-2 inline-block uppercase tracking-widest">
                                ${event.type}
                            </span>
                            <h3 class="text-xl font-bold text-white tracking-tight">${event.name}</h3>
                            <p class="text-sm text-indigo-200/70 mt-1 flex items-center">
                                <i data-lucide="users" class="w-3.5 h-3.5 mr-1.5 opacity-70"></i> ${event.target}
                            </p>
                            <p class="text-sm text-indigo-200/70 flex items-center mt-0.5">
                                <i data-lucide="calendar" class="w-3.5 h-3.5 mr-1.5 opacity-70"></i> ${event.date}
                            </p>
                        </div>
                        <div class="text-right">
                            <span class="text-2xl font-black ${isUpcoming ? 'text-cyan-400 drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]' : 'text-white/30'}">${dDay}</span>
                        </div>
                    </div>
                    ${event.note ? `<p class="text-sm text-indigo-100/60 mt-3 leading-relaxed border-t border-white/5 pt-3 italic">"${event.note}"</p>` : ''}
                    <div class="flex gap-3 mt-5">
                        <button onclick="window.getAiSuggestionsById('${event.id}')" class="flex-1 dm-button-primary py-2.5 rounded-xl text-xs font-bold flex items-center justify-center group">
                            <i data-lucide="sparkles" class="w-3.5 h-3.5 mr-2 group-hover:animate-pulse"></i> AI 인사이트
                        </button>
                        <button onclick="window.deleteEventById('${event.id}')" class="p-2.5 rounded-xl bg-white/5 hover:bg-rose-500/20 text-white/40 hover:text-rose-400 transition-all">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
                eventList.appendChild(card);
            });
            lucide.createIcons();
        }

        function showLoading(show) {
            loadingOverlay.classList.toggle('hidden', !show);
            loadingOverlay.classList.toggle('flex', show);
        }

        window.deleteEventById = deleteEvent;
        window.getAiSuggestionsById = (id) => {
            const event = events.find(e => e.id === id);
            if (event) getAiSuggestions(event);
        };
        window.closeModal = () => {
            aiModal.classList.add('hidden');
            aiModal.classList.remove('flex');
        };

        eventForm.addEventListener('submit', addEvent);
        lucide.createIcons();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Pretendard:wght@400;700;900&display=swap');
        
        :root {
            --dm-purple: #0f172a;
            --dm-gradient: radial-gradient(circle at top right, #312e81, #1e1b4b, #0f172a);
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background: var(--dm-gradient);
            background-attachment: fixed;
            color: #f8fafc;
        }

        .heading-font { font-family: 'Space Grotesk', sans-serif; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .dm-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .dm-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #6366f1;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
            outline: none;
        }

        .dm-button-primary {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .dm-button-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
            filter: brightness(1.1);
        }

        .dm-button-primary:active {
            transform: scale(0.95);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .float-anim { animation: float 6s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 pb-20">

    <!-- DeepMind Style Background Blur -->
    <div class="fixed top-[-10%] right-[-10%] w-[500px] h-[500px] bg-indigo-600/20 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="fixed bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-cyan-600/20 rounded-full blur-[100px] pointer-events-none"></div>

    <!-- Header -->
    <header class="w-full max-w-md mt-10 mb-12 text-center relative z-10">
        <div class="inline-block p-4 bg-white/5 rounded-[2rem] border border-white/10 shadow-2xl mb-6 float-anim">
            <div class="bg-gradient-to-br from-cyan-400 via-indigo-500 to-purple-600 p-3 rounded-2xl">
                <i data-lucide="brain-circuit" class="text-white w-8 h-8"></i>
            </div>
        </div>
        <h1 class="heading-font text-3xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-white via-indigo-200 to-cyan-200">
            Family Intelligence
        </h1>
        <p class="text-indigo-300/60 text-sm mt-2 font-medium tracking-wide uppercase">Vision AI Research Lab</p>
    </header>

    <!-- Event Add Form -->
    <section class="w-full max-w-md glass-card rounded-[2.5rem] p-8 mb-10 border border-white/10 shadow-2xl relative z-10">
        <h2 class="text-lg font-bold text-white mb-6 flex items-center heading-font">
            <span class="w-1.5 h-6 bg-cyan-400 rounded-full mr-3"></span> 새 일정 인텔리전스
        </h2>
        <form id="event-form" class="space-y-5">
            <div>
                <label class="block text-[10px] font-black text-indigo-300/50 uppercase tracking-widest mb-1.5 ml-1">Event Title</label>
                <input type="text" id="event-name" required placeholder="예: 둘째 딸 졸업식" class="w-full px-5 py-3.5 dm-input rounded-2xl text-sm">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-black text-indigo-300/50 uppercase tracking-widest mb-1.5 ml-1">Date</label>
                    <input type="date" id="event-date" required class="w-full px-5 py-3.5 dm-input rounded-2xl text-sm color-scheme-dark">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-indigo-300/50 uppercase tracking-widest mb-1.5 ml-1">Category</label>
                    <select id="event-type" class="w-full px-5 py-3.5 dm-input rounded-2xl text-sm appearance-none cursor-pointer">
                        <option value="생일">Birthdays</option>
                        <option value="기념일">Anniversaries</option>
                        <option value="가족모임">Gatherings</option>
                        <option value="기타">Special</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-[10px] font-black text-indigo-300/50 uppercase tracking-widest mb-1.5 ml-1">Target Person</label>
                <input type="text" id="event-target" placeholder="예: 아내 (커피를 좋아함)" class="w-full px-5 py-3.5 dm-input rounded-2xl text-sm">
            </div>
            <div>
                <label class="block text-[10px] font-black text-indigo-300/50 uppercase tracking-widest mb-1.5 ml-1">Additional Notes</label>
                <textarea id="event-note" placeholder="AI 분석을 위한 추가 정보..." class="w-full px-5 py-3.5 dm-input rounded-2xl text-sm h-20 resize-none"></textarea>
            </div>
            <button type="submit" class="w-full dm-button-primary font-bold py-4 rounded-2xl shadow-xl mt-2 text-sm tracking-tight">
                일정 데이터 등록
            </button>
        </form>
    </section>

    <!-- Event List -->
    <section class="w-full max-w-md relative z-10">
        <div class="flex justify-between items-center mb-6 px-4">
            <h2 class="heading-font text-lg font-bold text-white tracking-tight">Upcoming Timeline</h2>
            <div class="flex items-center space-x-2">
                <span class="w-2 h-2 bg-cyan-400 rounded-full animate-pulse"></span>
                <span class="text-[10px] text-indigo-300/60 font-black uppercase tracking-widest">Real-time Sync</span>
            </div>
        </div>
        <div id="event-list" class="space-y-4">
            <!-- Dynamic Content -->
            <div class="text-center py-20 text-indigo-300/20">데이터 분석 중...</div>
        </div>
    </section>

    <!-- AI Insight Modal -->
    <div id="ai-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 hidden items-center justify-center p-6">
        <div class="bg-indigo-950/80 w-full max-w-md rounded-[2.5rem] overflow-hidden border border-white/10 shadow-2xl flex flex-col max-h-[85vh]">
            <div class="p-8 bg-gradient-to-r from-indigo-600 to-purple-600 text-white flex justify-between items-center">
                <div class="flex items-center">
                    <div class="bg-white/20 p-2 rounded-xl mr-4 backdrop-blur-sm">
                        <i data-lucide="sparkles" class="w-5 h-5 text-cyan-300"></i>
                    </div>
                    <div>
                        <h3 class="text-xl font-bold heading-font tracking-tight">AI Insights</h3>
                        <p class="text-[10px] text-indigo-100/60 uppercase font-black tracking-widest mt-0.5">Gemini Analysis Engine</p>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-all">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div id="ai-content" class="p-8 overflow-y-auto custom-scrollbar text-indigo-100/90 leading-relaxed text-sm font-medium">
                <!-- AI Result -->
            </div>
            <div class="p-6 bg-white/5 border-t border-white/5 flex justify-center">
                <button onclick="closeModal()" class="w-full py-4 bg-white/10 hover:bg-white/20 text-white rounded-2xl font-bold text-xs tracking-widest uppercase transition-all">
                    Dismiss Insight
                </button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[100] hidden flex-col items-center justify-center">
        <div class="relative w-24 h-24 mb-8">
            <div class="absolute inset-0 border-4 border-indigo-500/20 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-cyan-400 border-t-transparent rounded-full animate-spin"></div>
            <div class="absolute inset-4 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-full animate-pulse flex items-center justify-center">
                <i data-lucide="cpu" class="text-white w-6 h-6"></i>
            </div>
        </div>
        <p class="text-white font-bold heading-font tracking-widest text-xs uppercase animate-pulse">Neural Processing...</p>
    </div>

</body>
</html>
